name: Unzip and Build APK

on:
  push:
    branches: [ "main", "رئيسي" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. جلب المستودع الذي يحتوي على ملف zip
    - uses: actions/checkout@v4

    # 2. فك ضغط ملف المشروع تلقائياً داخل السيرفر مطابق لاسم ملف حمزة
    - name: Unzip Project Files
      run: |
        unzip student-management.zip -d extracted_project
        if [ -d "extracted_project/student-management" ]; then
          mv extracted_project/student-management/* .
        else
          mv extracted_project/* .
        fi
        rm -rf extracted_project student-management.zip

    # 3. إعداد بيئة الجافا اللازمة لأندرويد
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 4. إعطاء صلاحية تشغيل أداة البناء Gradle
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 5. بدء تجميع وتوليد الـ APK
    - name: Build Debug APK
      run: ./gradlew assembleDebug

    # 6. استخراج ملف APK الجاهز للتحميل
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Student-Management-APK
        path: app/build/outputs/apk/debug/app-debug.apk
