name: Final APK Builder

on:
  push:
    branches: [ "main", "رئيسي" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. جلب المستودع
    - uses: actions/checkout@v4

    # 2. إنشاء هيكل مشروع أندرويد أولاً
    - name: Generate Android Template Base
      run: |
        mkdir -p app/src/main/java/com/studentmanagement/data
        mkdir -p app/src/main/java/com/studentmanagement/repository
        mkdir -p app/src/main/java/com/studentmanagement/viewmodel
        mkdir -p app/src/main/java/com/studentmanagement/ui
        mkdir -p app/src/main/res/layout
        
        # إنشاء ملفات البناء الأساسية للمشروع
        cat << 'EOF' > build.gradle.kts
        plugins {
            id("com.android.application") version "8.2.0" apply false
            id("org.jetbrains.kotlin.android") version "1.9.20" apply false
            id("org.jetbrains.kotlin.kapt") version "1.9.20" apply false
        }
        EOF

        cat << 'EOF' > settings.gradle.kts
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "StudentManagement"
        include(":app")
        EOF

        cat << 'EOF' > app/build.gradle.kts
        plugins {
            id("com.android.application")
            id("org.jetbrains.kotlin.android")
            id("org.jetbrains.kotlin.kapt")
        }
        android {
            namespace = "com.studentmanagement"
            compileSdk = 34
            defaultConfig {
                applicationId = "com.studentmanagement"
                minSdk = 24
                targetSdk = 34
                versionCode = 1
                versionName = "1.0"
            }
            buildTypes {
                release {
                    isMinifyEnabled = false
                }
            }
            compileOptions {
                sourceCompatibility = JavaVersion.VERSION_17
                targetCompatibility = JavaVersion.VERSION_17
            }
            kotlinOptions {
                jvmTarget = "17"
            }
        }
        dependencies {
            val roomVersion = "2.6.1"
            implementation("androidx.room:room-runtime:$roomVersion")
            implementation("androidx.room:room-ktx:$roomVersion")
            kapt("androidx.room:room-compiler:$roomVersion")
            implementation("androidx.lifecycle:lifecycle-viewmodel-ktx:2.7.0")
            implementation("androidx.lifecycle:lifecycle-livedata-ktx:2.7.0")
            implementation("org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3")
            implementation("com.google.android.material:material:1.11.0")
            implementation("androidx.recyclerview:recyclerview:1.3.2")
            implementation("androidx.appcompat:appcompat:1.6.1")
            implementation("androidx.constraintlayout:constraintlayout:2.1.4")
        }
        EOF

        # توليد أداة البناء المحلية
        gradle wrapper --gradle-version 8.2

    # 3. إعداد بيئة الجافا بعد إنشاء الملفات
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 4. صلاحية التشغيل
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 5. بناء الـ APK
    - name: Build Debug APK
      run: ./gradlew assembleDebug

    # 6. رفع الملف الناتج
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Student-Management-System-APK
        path: app/build/outputs/apk/debug/app-debug.apk
